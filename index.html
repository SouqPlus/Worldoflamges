<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Images | عالم الصور</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --soft-beige: #f5f5f0;
            --deep-brown: #3d3d3d;
            --white: #ffffff;
            --header-h: 70px;
        }
        * { box-sizing: border-box; transition: transform 0.3s ease, opacity 0.3s ease; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-beige);
            background-image: radial-gradient(#e2e2d5 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--deep-brown);
            margin: 0; padding: 0; text-align: center;
        }
        header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(245, 245, 240, 0.95);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; height: var(--header-h);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 10px rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }
        h1 { font-size: 1.4rem; color: var(--primary-gold); margin: 0; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
        .spacer { height: var(--header-h); }
        
        /* تنسيق حاوية الإعلان لضمان عدم تداخلها مع التصميم */
        .ad-container {
            width: 100%;
            margin: 20px auto;
            padding: 0 12px;
            max-width: 1000px;
            display: flex;
            justify-content: center;
        }

        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1000px; margin: 0 auto; padding: 0 12px 60px; }
        .img-card { position: relative; overflow: hidden; border-radius: 18px; background: #e9e9e2; aspect-ratio: 3/4; box-shadow: 0 5px 15px rgba(0,0,0,0.04); opacity: 0; transform: translateY(15px); }
        .img-card.reveal { opacity: 1; transform: translateY(0); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; display: block; }
        .img-card:hover { transform: scale(1.03); z-index: 2; }
        .modal {
            display: none; position: fixed; inset: 0;
            background-color: rgba(245, 245, 240, 0.99);
            backdrop-filter: blur(25px); z-index: 2000;
            justify-content: center; align-items: center; flex-direction: column; padding: 20px;
        }
        .modal-content { max-width: 100%; max-height: 75vh; border-radius: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.12); border: 6px solid #fff; }
        .btn-container { margin-top: 25px; display: flex; gap: 15px; }
        .btn { padding: 14px 45px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .btn-download { background: var(--primary-gold); color: white; }
        .btn-close { background: #fff; color: var(--deep-brown); border: 1px solid #ddd; }
        .loader-container { height: 100px; width: 100%; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 25px; height: 25px; border: 3px solid #ddd; border-top: 3px solid var(--primary-gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header><h1>World of Images</h1></header>
<div class="spacer"></div>

<!-- بداية قسم الإعلانات المدمج -->
<div class="ad-container">
    <!-- BEGIN AADS AD UNIT 2432878 -->
    <div id="frame" style="width: 100%; margin: auto; position: relative; z-index: 999;">
        <iframe data-aa='2432878' src='//acceptable.a-ads.com/2432878/?size=Adaptive' 
                style='border:0; padding:0; width:100%; max-width:728px; height:auto; overflow:hidden; display: block; margin: auto;'></iframe>
    </div>
    <!-- END AADS AD UNIT 2432878 -->
</div>
<!-- نهاية قسم الإعلانات -->

<div class="gallery" id="gallery"></div>
<div id="loader" class="loader-container"><div class="spinner"></div></div>

<div id="modal" class="modal" onclick="closePreview()">
    <img id="modal-img" class="modal-content" src="" alt="Preview" onclick="event.stopPropagation()">
    <div class="btn-container" onclick="event.stopPropagation()">
        <button class="btn btn-download" onclick="downloadImg()">تحميل</button>
        <button class="btn btn-close" onclick="closePreview()">إغلاق</button>
    </div>
</div>

<script>
const gallery = document.getElementById('gallery');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');
const loader = document.getElementById('loader');

let currentIdx = 0;
const totalTarget = 500;
const batch = 18;

const imageIds = Array.from({length: 1000}, (_, i) => i + 1)
                      .sort(() => Math.random() - 0.5)
                      .slice(0, totalTarget);

function loadBatch() {
    if (currentIdx >= totalTarget) { loader.style.display = 'none'; return; }
    const limit = Math.min(currentIdx + batch, totalTarget);
    for (; currentIdx < limit; currentIdx++) {
        const id = imageIds[currentIdx];
        const card = document.createElement('div');
        card.className = 'img-card';
        
        const img = document.createElement('img');
        img.src = `https://picsum.photos/id/${id}/600/800`;
        img.loading = "lazy";
        img.onload = () => card.classList.add('reveal');
        img.onclick = () => openPreview(`https://picsum.photos/id/${id}/1200/1600`);
        img.onerror = () => { img.src = `https://picsum.photos/600/800?random=${id + 2000}`; };
        card.appendChild(img);
        gallery.appendChild(card);
    }
}

function openPreview(url) {
    modalImg.src = url;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closePreview() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

async function downloadImg() {
    const btn = document.querySelector('.btn-download');
    btn.innerText = "جاري الحفظ...";
    try {
        const res = await fetch(modalImg.src, { mode: 'cors' });
        const blob = await res.blob();
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
            const reader = new FileReader();
            reader.onload = () => {
                const imgWindow = window.open(reader.result, '_blank');
                if (!imgWindow) alert("الرجاء السماح للنوافذ المنبثقة");
            };
            reader.readAsDataURL(blob);
        } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Wallpaper_${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
    } catch (e) {
        window.open(modalImg.src, '_blank');
    } finally {
        btn.innerText = "تحميل";
    }
}

window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) loadBatch(); };
loadBatch();
</script>

</body>
</html>
